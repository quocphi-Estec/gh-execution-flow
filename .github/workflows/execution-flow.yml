name: Website Deployment
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ==========================================
  # 1. JOB LINT
  # ==========================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4 # Nâng cấp lên v4

      - name: Cache dependencies
        id: cache
        uses: actions/cache@v4 # Nâng cấp lên v4
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint --if-present

  # ==========================================
  # 2. JOB TEST
  # ==========================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4 # Nâng cấp lên v4

      - name: Cache dependencies
        id: cache
        uses: actions/cache@v4 # Nâng cấp lên v4
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Test code
        id: run-tests
        run: npm run test

      - name: Upload test report
        if: ${{ failure() && steps.run-tests.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test.json # Hãy chắc chắn vitest của bạn đã cấu hình tạo ra file này khi lỗi

  # ==========================================
  # 3. JOB BUILD
  # ==========================================
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4 # Nâng cấp lên v4

      - name: Cache dependencies
        id: cache
        uses: actions/cache@v4 # Nâng cấp lên v4
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build website
        id: build-website
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist # Đóng gói thư mục dist

  # ==========================================
  # 4. JOB DEPLOY
  # ==========================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist # Ép download-artifact v4 phải giải nén đúng vào thư mục dist/ cũ

      - name: Output contents
        run: |
          echo "Kiểm tra các file trong thư mục dist vừa tải về:"
          ls dist

      - name: Deploy
        run: echo "Deploying..."
